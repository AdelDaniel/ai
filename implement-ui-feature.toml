   - Null-safe
   - Fully themed
   - Responsive
   - Accessible
   - UI only

4. **Reuse & Extraction Notes**
   - What should move to `widgets/`
   - What should become theme or `res/` tokens

5. **Accessibility & Responsiveness Checklist**
   - What standards were respected

---

## 9️⃣ ABSOLUTE RULES

- ❌ No service locator
- ❌ No repository or domain changes
- ❌ No business logic
- ❌ No inline magic numbers
- ❌ No unscoped rebuilds

If a requirement would need non-UI work:
→ Mention it briefly as a **note**, do NOT implement it.

Your goal is to produce **enterprise-grade Flutter UI code**
that could pass:
